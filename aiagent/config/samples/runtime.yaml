# Sample AgentRuntime for ADK-Go framework (Shared Mode)
# Single Framework process, multiple agents in same process
apiVersion: agent.ai/v1
kind: AgentRuntime
metadata:
  name: adk-runtime-sample
  namespace: default
spec:
  processMode: shared  # Single process for multiple agents

  # Handler Container - receives agent requests, manages framework process
  agentHandler:
    image: aiagent/adk-handler:latest
    env:
    - name: FRAMEWORK_BIN
      value: "/framework-rootfs/bin/adk-framework"
    - name: WORK_DIR
      value: "/shared/workdir"
    - name: CONFIG_DIR
      value: "/shared/config"
    resources:
      limits:
        cpu: "1"
        memory: "1Gi"
      requests:
        cpu: "200m"
        memory: "256Mi"

  # Framework Container - provides image content via ImageVolume
  # ENTRYPOINT: pause (DUMMY container)
  agentFramework:
    image: aiagent/adk-framework:latest
    type: adk-go
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "512Mi"

  harness:
  - name: model-harness-deepseek
  - name: memory-harness-inmemory
  - name: sandbox-harness-embedded

  replicas: 1
---
# Sample AgentRuntime for ADK-Go framework (Isolated Mode)
# Each agent gets its own Framework process
apiVersion: agent.ai/v1
kind: AgentRuntime
metadata:
  name: adk-isolated-runtime-sample
  namespace: default
spec:
  processMode: isolated  # Separate process per agent

  agentHandler:
    image: aiagent/adk-handler:latest
    env:
    - name: PROCESS_MODE
      value: "isolated"
    - name: FRAMEWORK_BIN
      value: "/framework-rootfs/bin/adk-framework"
    resources:
      limits:
        cpu: "1"
        memory: "1Gi"
      requests:
        cpu: "200m"
        memory: "256Mi"

  agentFramework:
    image: aiagent/adk-framework:latest
    type: adk-go
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "512Mi"

  harness:
  - name: model-harness-deepseek

  replicas: 1
---
# Sample AgentRuntime for OpenClaw framework (Gateway Mode)
# Handler communicates with OpenClaw Gateway via HTTP
apiVersion: agent.ai/v1
kind: AgentRuntime
metadata:
  name: openclaw-runtime-sample
  namespace: default
spec:
  # OpenClaw uses Gateway architecture - each AIAgent gets its own Gateway instance
  processMode: isolated  # Each Gateway is a separate process

  agentHandler:
    image: aiagent/openclaw-handler:latest
    env:
    - name: BASE_GATEWAY_PORT
      value: "18789"
    - name: WORK_DIR
      value: "/shared/workdir"
    - name: CONFIG_DIR
      value: "/shared/config"
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  # Framework Container - provides OpenClaw binary via ImageVolume
  agentFramework:
    image: aiagent/openclaw-framework:latest
    type: openclaw
    resources:
      limits:
        cpu: "2"
        memory: "4Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"

  harness:
  - name: model-harness-deepseek
  - name: memory-harness-inmemory

  replicas: 1
---
# Sample AgentRuntime for Custom framework
apiVersion: agent.ai/v1
kind: AgentRuntime
metadata:
  name: custom-runtime-sample
  namespace: default
spec:
  processMode: isolated

  agentHandler:
    image: my-org/my-handler:latest
    env:
    - name: CUSTOM_FRAMEWORK_ENDPOINT
      value: "localhost:9000"
    resources:
      limits:
        cpu: "1"
        memory: "1Gi"
      requests:
        cpu: "200m"
        memory: "256Mi"

  agentFramework:
    image: my-org/my-framework:latest
    type: custom
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "512Mi"

  harness:
  - name: model-harness-custom

  replicas: 1