syntax = "proto3";

package aiagent.framework.v1;

option go_package = "aiagent/pkg/framework/proto;proto";

// AgentService provides gRPC interface for Framework Container.
// Handler Container connects to this service to manage agents.
service AgentService {
    // Create an agent instance in the Framework Container
    rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);

    // Start an agent (makes it ready to process requests)
    rpc StartAgent(StartAgentRequest) returns (StartAgentResponse);

    // Stop an agent
    rpc StopAgent(StopAgentRequest) returns (StopAgentResponse);

    // Delete an agent instance
    rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);

    // Get agent status
    rpc GetAgentStatus(GetAgentStatusRequest) returns (GetAgentStatusResponse);

    // List all agents in the Framework Container
    rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

    // Run an agent invocation (streaming events)
    rpc RunAgent(RunAgentRequest) returns (stream AgentEvent);

    // Send a message to an agent
    rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

    // Health check
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// CreateAgentRequest contains configuration to create an agent.
message CreateAgentRequest {
    string agent_id = 1;          // Unique agent identifier
    string name = 2;              // Agent name
    string description = 3;       // Agent description
    string model = 4;             // Model ID (e.g., "deepseek-chat")
    AgentType type = 5;           // Agent type (LLM, Sequential, etc.)
    string instruction = 6;       // System prompt/instruction
    repeated ToolConfig tools = 7; // Tools available to the agent
    repeated string sub_agent_ids = 8; // Sub-agent IDs (for workflow agents)
    HarnessConfig harness = 9;    // Harness configuration
}

message CreateAgentResponse {
    string agent_id = 1;
    bool success = 2;
    string error = 3;
}

// AgentType enum
enum AgentType {
    AGENT_TYPE_UNSPECIFIED = 0;
    AGENT_TYPE_LLM = 1;
    AGENT_TYPE_SEQUENTIAL = 2;
    AGENT_TYPE_PARALLEL = 3;
    AGENT_TYPE_LOOP = 4;
    AGENT_TYPE_CUSTOM = 5;
}

// ToolConfig describes a tool configuration.
message ToolConfig {
    string name = 1;
    string description = 2;
    bool enabled = 3;
    bytes config = 4;  // Tool-specific configuration (JSON)
}

// HarnessConfig contains harness settings for the agent.
message HarnessConfig {
    ModelHarnessConfig model = 1;
    MemoryHarnessConfig memory = 2;
    SandboxHarnessConfig sandbox = 3;
    SkillsHarnessConfig skills = 4;
}

message ModelHarnessConfig {
    string provider = 1;
    string endpoint = 2;
    string default_model = 3;
    repeated ModelConfig models = 4;
}

message ModelConfig {
    string name = 1;
    bool allowed = 2;
    int32 max_tokens = 3;
    double temperature = 4;
}

message MemoryHarnessConfig {
    string type = 1;
    string endpoint = 2;
    int32 ttl = 3;
}

message SandboxHarnessConfig {
    string type = 1;
    string mode = 2;  // "embedded" or "external"
    string endpoint = 3;
    int32 timeout = 4;
}

message SkillsHarnessConfig {
    repeated SkillConfig skills = 1;
}

message SkillConfig {
    string name = 1;
    string version = 2;
    bool allowed = 3;
}

// StartAgentRequest
message StartAgentRequest {
    string agent_id = 1;
}

message StartAgentResponse {
    bool success = 1;
    string error = 2;
}

// StopAgentRequest
message StopAgentRequest {
    string agent_id = 1;
}

message StopAgentResponse {
    bool success = 1;
    string error = 2;
}

// DeleteAgentRequest
message DeleteAgentRequest {
    string agent_id = 1;
}

message DeleteAgentResponse {
    bool success = 1;
    string error = 2;
}

// GetAgentStatusRequest
message GetAgentStatusRequest {
    string agent_id = 1;
}

message GetAgentStatusResponse {
    string agent_id = 1;
    string name = 2;
    AgentPhase phase = 3;
    bool running = 4;
    int64 session_count = 5;
    int64 last_activity_time = 6;
    AgentMetrics metrics = 7;
}

enum AgentPhase {
    AGENT_PHASE_UNSPECIFIED = 0;
    AGENT_PHASE_PENDING = 1;
    AGENT_PHASE_INITIALIZING = 2;
    AGENT_PHASE_RUNNING = 3;
    AGENT_PHASE_MIGRATING = 4;
    AGENT_PHASE_ERROR = 5;
    AGENT_PHASE_TERMINATED = 6;
}

message AgentMetrics {
    int64 total_invocations = 1;
    int64 successful_invocations = 2;
    int64 failed_invocations = 3;
    double average_latency = 4;
    int64 tokens_used = 5;
}

// ListAgentsRequest
message ListAgentsRequest {
}

message ListAgentsResponse {
    repeated AgentInfo agents = 1;
}

message AgentInfo {
    string id = 1;
    string name = 2;
    AgentType type = 3;
    AgentPhase phase = 4;
}

// RunAgentRequest - start an agent invocation
message RunAgentRequest {
    string agent_id = 1;
    string session_id = 2;       // Optional: resume existing session
    string invocation_id = 3;    // Unique invocation ID
    Content user_content = 4;    // User input
    RunConfig config = 5;        // Run configuration
}

message Content {
    string type = 1;             // "text", "image", "audio", etc.
    string text = 2;             // Text content
    bytes data = 3;              // Binary data (for images/audio)
    string mime_type = 4;        // MIME type for binary data
}

message RunConfig {
    int32 max_iterations = 1;
    double temperature_override = 2;
    map<string, string> custom_config = 3;
}

// AgentEvent - streaming event from agent execution
message AgentEvent {
    string invocation_id = 1;
    string author = 2;           // Agent that produced this event
    EventType type = 3;
    Content content = 4;
    string error = 5;
    int64 timestamp = 6;
    map<string, string> metadata = 7;
}

enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_TEXT = 1;
    EVENT_TYPE_TOOL_CALL = 2;
    EVENT_TYPE_TOOL_RESULT = 3;
    EVENT_TYPE_MODEL_REQUEST = 4;
    EVENT_TYPE_MODEL_RESPONSE = 5;
    EVENT_TYPE_STATE_CHANGE = 6;
    EVENT_TYPE_ERROR = 7;
    EVENT_TYPE_COMPLETE = 8;
}

// SendMessageRequest
message SendMessageRequest {
    string agent_id = 1;
    string session_id = 2;
    Content content = 3;
}

message SendMessageResponse {
    Content response = 1;
    string session_id = 2;
    string error = 3;
}

// HealthCheckRequest
message HealthCheckRequest {
}

message HealthCheckResponse {
    bool healthy = 1;
    string version = 2;
    int64 uptime_seconds = 3;
    int32 agent_count = 4;
}