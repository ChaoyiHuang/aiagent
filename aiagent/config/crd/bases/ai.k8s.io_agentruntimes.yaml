apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: agentruntimes.ai.k8s.io
spec:
  group: ai.k8s.io
  names:
    kind: AgentRuntime
    listKind: AgentRuntimeList
    plural: agentruntimes
    singular: agentruntime
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - agentHandler
            - agentFramework
            properties:
              agentHandler:
                type: object
                required:
                - image
                properties:
                  image:
                    type: string
                  imagePullPolicy:
                    type: string
                    enum:
                    - Always
                    - Never
                    - IfNotPresent
                  env:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          properties:
                            secretKeyRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                            configMapKeyRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                  resources:
                    type: object
                    properties:
                      limits:
                        type: object
                        additionalProperties:
                          type: string
                      requests:
                        type: object
                        additionalProperties:
                          type: string
                  args:
                    type: array
                    items:
                      type: string
                  command:
                    type: array
                    items:
                      type: string
                  volumeMounts:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        mountPath:
                          type: string
                        subPath:
                          type: string
              agentFramework:
                type: object
                required:
                - image
                - type
                properties:
                  image:
                    type: string
                  type:
                    type: string
                    enum:
                    - adk-go
                    - openclaw
                    - langchain
                  config:
                    type: object
                    additionalProperties:
                      type: string
                  args:
                    type: array
                    items:
                      type: string
              harness:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    optional:
                      type: boolean
              agentConfig:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    configMapRef:
                      type: string
                    optional:
                      type: boolean
              sandboxTemplateRef:
                type: string
              replicas:
                type: integer
                default: 1
              nodeSelector:
                type: object
                additionalProperties:
                  type: string
              affinity:
                type: object
                properties:
                  nodeAffinity:
                    type: object
                  podAffinity:
                    type: object
                  podAntiAffinity:
                    type: object
              tolerations:
                type: array
                items:
                  type: object
              serviceAccountName:
                type: string
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Initializing
                - Running
                - Error
                - Terminated
              podIPs:
                type: array
                items:
                  type: string
              readyReplicas:
                type: integer
              agentCount:
                type: integer
              agents:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    agentID:
                      type: string
                    phase:
                      type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              lastAgentSyncTime:
                type: string
                format: date-time
    subresources:
      status: {}